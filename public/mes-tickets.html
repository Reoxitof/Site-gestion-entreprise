<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Corp — Mes Tickets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Anton&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--border:rgba(255,255,255,0.08);
  --gold:#c9a84c;--white:#f0eaff;--white-dim:rgba(240,234,255,0.55);
  --green:#4caf7d;--blue:#4c8af0;--purple:#a78bfa;--red:#e24040;
}
body{background:var(--bg);color:var(--white);font-family:Inter,Arial;min-height:100vh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:Anton,Arial;font-size:20px;letter-spacing:3px;color:var(--gold);}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--white-dim);}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#8b6914);display:flex;align-items:center;justify-content:center;font-family:Anton,Arial;font-size:14px;color:#000;font-weight:900;}
.btn-logout{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--white-dim);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:32px 20px;}
.page-title{font-family:Anton,Arial;font-size:28px;letter-spacing:3px;color:var(--gold);margin-bottom:6px;}
.page-sub{font-size:12px;color:var(--white-dim);margin-bottom:28px;}

/* TICKET CARD */
.ticket-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;cursor:pointer;transition:border-color .2s,box-shadow .2s;}
.ticket-card:hover{border-color:rgba(201,168,76,0.4);box-shadow:0 4px 24px rgba(201,168,76,0.08);}
.ticket-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.ticket-client{font-family:Anton,Arial;font-size:18px;letter-spacing:1px;color:var(--white);}
.ticket-type{font-size:12px;color:var(--white-dim);margin-top:2px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.badge-gold{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);color:var(--gold);}
.badge-purple{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);color:var(--purple);}
.badge-green{background:rgba(76,175,125,0.12);border:1px solid rgba(76,175,125,0.3);color:var(--green);}
.badge-blue{background:rgba(76,138,240,0.12);border:1px solid rgba(76,138,240,0.3);color:var(--blue);}
.ticket-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--white-dim);}
.ticket-meta span{display:flex;align-items:center;gap:5px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;width:min(560px,100%);max-height:90vh;overflow-y:auto;padding:24px;}
.modal-title{font-family:Anton,Arial;font-size:22px;letter-spacing:2px;color:var(--white);margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--white-dim);font-size:20px;cursor:pointer;margin-top:-4px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;}
.info-label{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--white-dim);margin-bottom:4px;}
.info-val{font-size:13px;font-weight:700;color:var(--white);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--white-dim);}
.empty i{font-size:40px;margin-bottom:16px;opacity:0.3;}
.empty p{font-size:14px;}

/* LOADER */
.loader{text-align:center;padding:60px;color:var(--white-dim);font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">ELITE CORP</div>
  <div class="topbar-user">
    <div class="avatar" id="avatarEl">?</div>
    <div>
      <div id="userName" style="font-weight:700;font-size:13px;color:var(--white);">—</div>
      <div id="userPoste" style="font-size:10px;color:var(--white-dim);">—</div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
  </div>
</div>

<div class="main">
  <div class="page-title">MES TICKETS</div>
  <div class="page-sub">Vos missions confirmées et en cours</div>
  <div id="ticketList"><div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Chargement...</div></div>
</div>

<!-- MODAL DÉTAIL -->
<div class="modal-overlay" id="modalDetail">
  <div class="modal">
    <button class="modal-close" onclick="closeDetail()"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-title" id="detailTitle">—</div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
let currentUser = null;

async function init() {
  try {
    const r = await fetch('/api/me');
    const d = await r.json();
    if (!d.user) { window.location.href = '/login'; return; }
    currentUser = d.user;
    document.getElementById('userName').textContent = d.user.prenom + ' ' + d.user.nom;
    document.getElementById('userPoste').textContent = d.user.poste;
    document.getElementById('avatarEl').textContent = (d.user.prenom[0] || '?').toUpperCase();
    loadTickets();
  } catch(e) { window.location.href = '/login'; }
}

async function loadTickets() {
  try {
    const r = await fetch('/api/commandes/mes-tickets');
    if (!r.ok) { document.getElementById('ticketList').innerHTML = '<div class="empty"><i class="fa-solid fa-lock"></i><p>Accès refusé</p></div>'; return; }
    const data = await r.json();
    renderTickets(data);
  } catch(e) {
    document.getElementById('ticketList').innerHTML = '<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><p>Erreur de chargement</p></div>';
  }
}

const statutColors = { confirme:'badge-gold', paye:'badge-purple', termine:'badge-green' };
const statutLabels = { confirme:'Confirmé', paye:'Payé', termine:'Terminé' };

function renderTickets(data) {
  const el = document.getElementById('ticketList');
  if (!data.length) {
    el.innerHTML = '<div class="empty"><i class="fa-solid fa-clipboard-list"></i><p>Aucun ticket assigné pour le moment.</p></div>';
    return;
  }
  el.innerHTML = data.map(c => {
    const date = c.date_evenement ? new Date(c.date_evenement).toLocaleDateString('fr-FR', {weekday:'short',day:'numeric',month:'long',year:'numeric'}) : null;
    return `<div class="ticket-card" onclick="openDetail(${c.id})">
      <div class="ticket-header">
        <div>
          <div class="ticket-client">${c.client_nom}</div>
          <div class="ticket-type">${c.type_prestation}</div>
        </div>
        <span class="badge ${statutColors[c.statut]||'badge-blue'}">${statutLabels[c.statut]||c.statut}</span>
      </div>
      <div class="ticket-meta">
        <span><i class="fa-solid fa-building"></i> ${c.division}</span>
        ${date ? `<span><i class="fa-solid fa-calendar"></i> ${date}</span>` : ''}
        ${c.lieu ? `<span><i class="fa-solid fa-location-dot"></i> ${c.lieu}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  window._tickets = data;
}

function openDetail(id) {
  const c = (window._tickets || []).find(x => x.id === id);
  if (!c) return;
  const date = c.date_evenement ? new Date(c.date_evenement).toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  document.getElementById('detailTitle').textContent = c.client_nom.toUpperCase();
  document.getElementById('detailContent').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
      <span class="badge badge-blue">${c.division}</span>
      <span class="badge ${statutColors[c.statut]||'badge-blue'}">${statutLabels[c.statut]||c.statut}</span>
    </div>
    <div class="info-grid">
      <div class="info-box">
        <div class="info-label">Type de prestation</div>
        <div class="info-val">${c.type_prestation}</div>
      </div>
      <div class="info-box">
        <div class="info-label">Date événement</div>
        <div class="info-val">${date}</div>
      </div>
      <div class="info-box">
        <div class="info-label">Lieu</div>
        <div class="info-val">${c.lieu||'—'}</div>
      </div>
      <div class="info-box">
        <div class="info-label">Contact client</div>
        <div class="info-val">${c.client_contact||'—'}</div>
      </div>
    </div>
    ${c.description ? `<div class="info-box" style="margin-bottom:10px;"><div class="info-label">Description</div><div style="font-size:12px;color:var(--white-dim);line-height:1.6;margin-top:4px;">${c.description}</div></div>` : ''}
  `;
  document.getElementById('modalDetail').classList.add('open');
}

function closeDetail() {
  document.getElementById('modalDetail').classList.remove('open');
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

document.getElementById('modalDetail').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

init();
</script>
</body>
</html>
