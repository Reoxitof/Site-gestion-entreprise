<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Corp — Changer mon mot de passe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Anton&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(circle at top,#1a0a2e,#08040d 60%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,Arial;color:#f0eaff;padding:20px;}
.card{width:min(440px,100%);background:rgba(17,17,24,0.95);border:1px solid rgba(201,168,76,0.25);border-radius:20px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.logo{font-family:Anton,Arial;font-size:22px;letter-spacing:4px;color:#c9a84c;margin-bottom:6px;}
h1{font-size:20px;font-weight:800;margin-bottom:6px;}
.sub{font-size:12px;color:rgba(240,234,255,0.55);margin-bottom:28px;line-height:1.5;}
.alert{background:rgba(240,144,48,0.1);border:1px solid rgba(240,144,48,0.3);border-radius:10px;padding:12px 14px;font-size:12px;color:#f09030;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
label{display:block;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(240,234,255,0.55);margin-bottom:6px;margin-top:16px;}
input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#08040d;color:white;font-size:13px;font-weight:600;outline:none;transition:border-color .2s;}
input:focus{border-color:#c9a84c;}
.btn{width:100%;margin-top:20px;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#c9a84c,#8b6914);color:#000;font-weight:900;font-size:14px;letter-spacing:1px;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:0.85;}
.error{color:#e24040;font-size:12px;margin-top:10px;display:none;}
.success{color:#4caf7d;font-size:12px;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ELITE CORP.</div>
  <h1>Changer mon mot de passe</h1>
  <div class="sub">La direction a réinitialisé ton mot de passe. Tu dois en choisir un nouveau pour continuer.</div>
  <div class="alert">⚠️ Cette action est obligatoire avant d'accéder au dashboard.</div>

  <label>Mot de passe temporaire (actuel)</label>
  <input type="password" id="currentPass" placeholder="Mot de passe fourni par la direction" autocomplete="current-password">

  <label>Nouveau mot de passe</label>
  <input type="password" id="newPass" placeholder="Minimum 6 caractères" autocomplete="new-password">

  <label>Confirmer le nouveau mot de passe</label>
  <input type="password" id="confirmPass" placeholder="Répète le nouveau mot de passe" autocomplete="new-password">

  <button class="btn" onclick="changePassword()">Confirmer le changement</button>
  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>
</div>

<script>
async function changePassword() {
  const current = document.getElementById('currentPass').value;
  const newPass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const errEl = document.getElementById('errorMsg');
  const okEl = document.getElementById('successMsg');
  errEl.style.display = 'none';
  okEl.style.display = 'none';

  if (!current || !newPass || !confirm) {
    errEl.textContent = '❌ Remplis tous les champs.'; errEl.style.display = 'block'; return;
  }
  if (newPass.length < 6) {
    errEl.textContent = '❌ Le nouveau mot de passe doit faire au moins 6 caractères.'; errEl.style.display = 'block'; return;
  }
  if (newPass !== confirm) {
    errEl.textContent = '❌ Les mots de passe ne correspondent pas.'; errEl.style.display = 'block'; return;
  }
  if (newPass === current) {
    errEl.textContent = '❌ Le nouveau mot de passe doit être différent de l\'actuel.'; errEl.style.display = 'block'; return;
  }

  try {
    const r = await fetch('/api/me/password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ current_password: current, new_password: newPass })
    });
    const d = await r.json();
    if (d.success) {
      okEl.textContent = '✅ Mot de passe changé ! Redirection...';
      okEl.style.display = 'block';
      setTimeout(() => window.location.href = '/dashboard', 1500);
    } else {
      errEl.textContent = '❌ ' + (d.error || 'Erreur');
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = '❌ Erreur réseau.'; errEl.style.display = 'block';
  }
}

// Vérifier si l'utilisateur est connecté
fetch('/api/me').then(r => r.json()).then(d => {
  if (!d.user) window.location.href = '/login';
}).catch(() => window.location.href = '/login');
</script>
</body>
</html>
