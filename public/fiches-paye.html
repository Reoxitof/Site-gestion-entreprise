<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Corp — Fiches de Paye</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#111118;--border:rgba(201,168,76,0.25);--gold:#c9a84c;--gold-dim:#8a6f2e;--white:#f0ead8;--white-dim:#9a9080;--green:#4caf7d;--red:#e24040;}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);}
.btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--white);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s;font-family:'Inter',sans-serif;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;color:#000;}
.btn-gold:hover{opacity:0.85;color:#000;}
.btn-green{background:rgba(76,175,125,0.15);border:1px solid rgba(76,175,125,0.4);color:var(--green);}
.btn-danger{background:rgba(226,64,64,0.12);border:1px solid rgba(226,64,64,0.3);color:var(--red);}
.main{max-width:900px;margin:0 auto;padding:32px 20px;}
.page-title{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gold);margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--white-dim);margin-bottom:28px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.card-title{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--white-dim);margin-bottom:6px;}
.input-field{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;outline:none;}
.input-field:focus{border-color:var(--gold);}
select.input-field{cursor:pointer;}
.fiche-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.fiche-info{flex:1;min-width:200px;}
.fiche-nom{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;color:var(--white);}
.fiche-meta{font-size:11px;color:var(--white-dim);margin-top:4px;}
.fiche-montant{font-family:'Anton',sans-serif;font-size:24px;color:var(--gold);}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.badge-wait{background:rgba(240,144,48,0.12);border:1px solid rgba(240,144,48,0.3);color:#f09030;}
.badge-paid{background:rgba(76,175,125,0.12);border:1px solid rgba(76,175,125,0.3);color:var(--green);}
.empty{text-align:center;padding:40px;color:var(--white-dim);font-size:13px;}
.empty i{font-size:32px;margin-bottom:12px;opacity:0.3;display:block;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">FICHES DE PAYE</div>
  <div style="display:flex;gap:8px;">
    <a href="/dashboard" class="btn"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    <button class="btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
</div>

<div class="main">
  <div class="page-title">FICHES DE PAYE</div>
  <div class="page-sub">Créer et gérer les fiches de paye — sélection depuis les Dossiers RH</div>

  <!-- Formulaire création -->
  <div class="card" id="createSection" style="display:none;">
    <div class="card-title"><i class="fa-solid fa-plus"></i> Nouvelle fiche de paye</div>
    <div class="form-group">
      <label>Personnel (depuis Dossiers RH)</label>
      <select class="input-field" id="fichePersonnel">
        <option value="">— Chargement... —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Montant ($)</label>
      <input class="input-field" id="ficheMontant" type="number" min="0" step="1" placeholder="Ex: 5000"/>
    </div>
    <div class="form-group">
      <label>Description (optionnel)</label>
      <input class="input-field" id="ficheDesc" placeholder="Ex: Mission sécurité soirée VIP"/>
    </div>
    <button class="btn btn-gold" onclick="creerFiche()"><i class="fa-solid fa-floppy-disk"></i> Créer la fiche</button>
  </div>

  <!-- Liste fiches -->
  <div id="fichesList"><div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Chargement...</div></div>
</div>

<script src="/token-patch.js"></script>
<script>
let currentUser = null;
let isDir = false;

async function init() {
  try {
    const r = await fetch('/api/me');
    const d = await r.json();
    if (!d.user) { window.location.href = '/login'; return; }
    currentUser = d.user;
    isDir = ['admin','direction'].includes(d.user.role) || ['Directeur Général','Directeur de Division','Coordinateur','CEO','Directeur'].includes(d.user.poste);
    if (isDir) document.getElementById('createSection').style.display = 'block';
    loadDossiers();
    loadFiches();
  } catch(e) { window.location.href = '/login'; }
}

async function loadDossiers() {
  try {
    const r = await fetch('/api/dossiers-rh');
    const data = await r.json();
    const sel = document.getElementById('fichePersonnel');
    if (!data.length) { sel.innerHTML = '<option value="">Aucun dossier RH</option>'; return; }
    sel.innerHTML = '<option value="">— Sélectionner —</option>' + data.map(d =>
      '<option value="' + d.id + '">' + (d.prenom||'') + ' ' + (d.nom||'') + ' — ' + (d.role||'employe') + '</option>'
    ).join('');
  } catch(e) {}
}

async function loadFiches() {
  try {
    const r = await fetch('/api/fiches-paye');
    const fiches = await r.json();
    renderFiches(fiches);
  } catch(e) {
    document.getElementById('fichesList').innerHTML = '<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i> Erreur chargement</div>';
  }
}

function renderFiches(fiches) {
  const el = document.getElementById('fichesList');
  if (!fiches.length) { el.innerHTML = '<div class="empty"><i class="fa-solid fa-file-invoice-dollar"></i> Aucune fiche de paye.</div>'; return; }
  el.innerHTML = fiches.map(f => {
    const payBtn = (isDir && f.statut === 'en_attente') ? '<button class="btn btn-green" style="font-size:11px;padding:6px 12px;" onclick="payerFiche(' + f.id + ')"><i class="fa-solid fa-check"></i> Payer</button>' : '';
    const paye = f.statut === 'paye' ? '<div style="font-size:10px;color:var(--green);margin-top:4px;"><i class="fa-solid fa-check-circle"></i> Payé' + (f.paye_le ? ' le ' + new Date(f.paye_le).toLocaleDateString('fr-FR') : '') + '</div>' : '';
    let details = [];
    try { details = JSON.parse(f.details || '[]'); } catch(e) {}
    const desc = details[0]?.description || '';
    return '<div class="fiche-card"><div class="fiche-info"><div class="fiche-nom">' + (f.prenom||'') + ' ' + (f.nom||'') + '</div><div class="fiche-meta">' + (f.poste||'') + (desc ? ' — ' + desc : '') + '</div>' + paye + '</div><div style="text-align:right;"><div class="fiche-montant">' + Number(f.montant_total).toLocaleString('fr-FR') + ' $</div><span class="badge ' + (f.statut==='paye'?'badge-paid':'badge-wait') + '">' + (f.statut==='paye'?'Payé':'En attente') + '</span><div style="margin-top:8px;">' + payBtn + '</div></div></div>';
  }).join('');
}

async function creerFiche() {
  const dossier_id = document.getElementById('fichePersonnel').value;
  const montant = document.getElementById('ficheMontant').value;
  const description = document.getElementById('ficheDesc').value.trim();
  if (!dossier_id || !montant || parseFloat(montant) <= 0) { alert('Sélectionne un personnel et saisis un montant'); return; }
  try {
    const r = await fetch('/api/fiches-paye/manual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dossier_id: parseInt(dossier_id), montant: parseFloat(montant), description })
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('ficheMontant').value = '';
      document.getElementById('ficheDesc').value = '';
      loadFiches();
    } else { alert(d.error || 'Erreur'); }
  } catch(e) { alert('Erreur réseau'); }
}

async function payerFiche(id) {
  if (!confirm('Confirmer le paiement ?')) return;
  try {
    const r = await fetch('/api/fiches-paye/' + id + '/payer', { method: 'POST' });
    if (r.ok) loadFiches();
  } catch(e) {}
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

init();
</script>
</body>
</html>
